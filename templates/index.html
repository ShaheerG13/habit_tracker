<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Task Check</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <h1>Daily Habits</h1>

        <form method="post" class="habit-form">
            {% for hid, name in habit_names.items() %}
                <label class="habit-label">
                    <input type="checkbox" name="habit_{{ hid }}" {% if task_status(hid) %}checked{% endif %}>
                    <span>{{ name }}</span>
                </label>
            {% endfor %}
            <button type="submit" class="save-btn">Save</button>
        </form>

        <a href="/history" class="history-link">View Task History</a>
        <a href="/logout" class="history-link" style="color: black;">Logout</a>
    </div>
</body>
</html>
