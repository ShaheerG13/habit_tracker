<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Task Check</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="login-container">
        <h1>Register</h1>

        <form action="/register" method="POST">
            <label for="register-username">Username:</label><br>
            <input type="text" id="register-username" name="username" required><br><br>

            <label for="register-email">Email:</label><br>
            <input type="email" id="register-email" name="email" required><br><br>

            <label for="register-password">Password:</label><br>
            <input type="password" id="register-password" name="password" required><br><br>

            <label for="register-confirm-password">Confirm Password:</label><br>
            <input type="password" id="register-confirm-password" name="confirm_password" required><br><br>

            <button type="submit">Register</button>
        </form>

        <a href="/login" class="register-link" style ="margin-top: 2rem;">Return to login</a>
    </div>
</body>
</html>
